<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Proxy - Access Blocked Sites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .proxy-link {
            background: white;
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            color: #667eea;
            font-size: 13px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .copy-btn {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }

        .info-box strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 Universal Proxy</h1>
        <p class="subtitle">Access blocked websites anywhere</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://youtube.com)" />
            <button onclick="generateProxy()">Generate Proxy Link</button>
        </div>

        <div class="result" id="result">
            <div class="result-title">✅ Proxy Link Generated:</div>
            <div class="proxy-link" id="proxyLink"></div>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>

        <div class="info-box">
            <strong>📝 How to use:</strong><br>
            1. Enter a blocked website URL<br>
            2. Click "Generate Proxy Link"<br>
            3. Copy and share the proxy link<br>
            4. Access the site through the proxy anywhere
        </div>
    </div>

    <script>
        function generateProxy() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            // Ensure URL has protocol
            let fullUrl = url;
            if (!fullUrl.startsWith('http://') && !fullUrl.startsWith('https://')) {
                fullUrl = 'https://' + fullUrl;
            }

            // Generate proxy link
            const proxyLink = window.location.origin + '/proxy/' + fullUrl;
            
            // Display result
            document.getElementById('proxyLink').textContent = proxyLink;
            document.getElementById('result').classList.add('show');
        }

        function copyToClipboard() {
            const proxyLink = document.getElementById('proxyLink').textContent;
            navigator.clipboard.writeText(proxyLink).then(() => {
                alert('Proxy link copied to clipboard!');
            });
        }

        // Allow Enter key to generate proxy
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateProxy();
            }
        });
    </script>
</body>
</html>
